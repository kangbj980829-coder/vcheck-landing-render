services:
  - type: web
    name: vcheck-landing
    runtime: static
    branch: main
    autoDeploy: true
    buildCommand: ""
    staticPublishPath: ./site
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
